- name: Test lookup missing secret
  hosts: localhost
  gather_facts: false

  vars:
    privx_url: "{{ lookup('env', 'PRIVX_URL') }}"
    privx_token: "{{ lookup('env', 'PRIVX_TOKEN') }}"

  tasks:
    - name: Lookup missing secret should fail
      block:
        - name: Try to read missing secret
          ansible.builtin.set_fact:
            missing_secret_value: >-
              {{ lookup(
                  'sshcom.privx.privx_secret',
                  'this-secret-does-not-exist',
                  url=privx_url,
                  token=privx_token
              ) }}

        - name: Fail if lookup unexpectedly succeeded
          ansible.builtin.fail:
            msg: "Lookup succeeded unexpectedly for missing secret"

      rescue:
        - name: Verify error was about missing secret
          ansible.builtin.debug:
            msg: "Lookup failed as expected for missing secret"
