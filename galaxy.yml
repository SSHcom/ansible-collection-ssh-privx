namespace: sshcom
name: privx
version: 1.43.0
readme: README.md

authors:
  - SSH Communications Security

description: Ansible collection for retrieving secrets from PrivX Secret Vault.

license:
  - Apache-2.0

tags:
  - privx
  - secrets
  - vault

dependencies: {}

repository: https://github.com/ssh/ansible-collection-ssh-privx
