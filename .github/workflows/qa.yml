name: QA

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/sshcom/privx

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint ruff bandit pip-audit

      - name: Run ansible-lint
        working-directory: ansible_collections/sshcom/privx
        run: |
          ansible-lint . tests/integration/*.yml

      - name: Run ansible-test sanity
        working-directory: ansible_collections/sshcom/privx
        run: |
          ansible-test sanity --docker

      - name: Run ruff
        working-directory: ansible_collections/sshcom/privx
        run: |
          ruff check .

      - name: Run bandit
        working-directory: ansible_collections/sshcom/privx
        run: |
          bandit -r plugins

      - name: Run pip-audit
        working-directory: ansible_collections/sshcom/privx
        run: |
          pip-audit